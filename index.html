<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <!-- RallyReady ships its own in-app EN/RO toggle (RR.i18n). Tell browser
       translators (e.g. Chrome's "Translate page") to stay out of it, so they
       can't re-translate the already-localized UI into garbage — which turned
       "Tips" into "patella" and rewrote our copy on top of our own strings. -->
  <meta name="google" content="notranslate" />
  <!-- viewport-fit=cover lets the app extend under Android system bars when installed -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FF6B35" />
  <meta name="description" content="RallyReady — a youth volleyball practice generator for coaches." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="RallyReady" />
  <title>RallyReady</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Self-hosted variable display + body fonts. Preloaded so the brand type paints
       fast; both are same-origin and precached by the service worker (offline-first).
       crossorigin is required because font fetches are always CORS-mode. -->
  <link rel="preload" href="fonts/bricolage-grotesque.var.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/hanken-grotesk.var.woff2" as="font" type="font/woff2" crossorigin />

  <!-- Pre-paint theme bootstrap: set the effective theme on <html> before the
       stylesheet applies, so there is no flash of the wrong theme on load.
       Reads the saved preference from the same localStorage key as RR.state. -->
  <script>
    (function () {
      try {
        var pref = "system";
        var raw = localStorage.getItem("rallyready.v1");
        if (raw) { var s = JSON.parse(raw); if (s && s.theme) pref = s.theme; }
        var dark = pref === "dark" ||
          (pref === "system" && window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute("content", dark ? "#141E33" : "#FF6B35");
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="css/styles.css" />
  <!-- Per-page "what is this page for?" helper (the i / speaker under every title). -->
  <link rel="stylesheet" href="css/page-guide.css" />
  <!-- Team setup screen styles, split out to keep each CSS file under 800 lines. -->
  <link rel="stylesheet" href="css/team.css" />
  <!-- Tips screen styles, split out to keep each CSS file under 800 lines. -->
  <link rel="stylesheet" href="css/tips.css" />
  <!-- Tips "show, don't just tell" visuals: animated motion diagrams + video links. -->
  <link rel="stylesheet" href="css/tips-visuals.css" />
  <!-- Today + History screen styles (kept separate for the same 800-line rule). -->
  <link rel="stylesheet" href="css/today.css" />
  <!-- Drills browser styles (split out for the same 800-line rule). -->
  <link rel="stylesheet" href="css/drills.css" />
  <!-- Added-feature styles (teams, backup, games, favorites, plan editing,
       focus picker, game banners, attendance) — split for the 800-line rule. -->
  <link rel="stylesheet" href="css/features.css" />
  <link rel="stylesheet" href="css/roster.css" />
  <!-- Players tab + 1-on-1 profile (squad grid, photos, notes, goals, skills). -->
  <link rel="stylesheet" href="css/players.css" />
  <!-- Position coaching guides + lineup builder. -->
  <link rel="stylesheet" href="css/positions.css" />
  <link rel="stylesheet" href="css/calendar.css" />
  <!-- In-practice run-mode timer overlay. -->
  <link rel="stylesheet" href="css/run.css" />
  <!-- Court diagrams + the "how it's organized" read-out. -->
  <link rel="stylesheet" href="css/diagram.css" />
  <!-- Ideas feed (the new Practice home): scrollable coaching inspiration. -->
  <link rel="stylesheet" href="css/feed.css" />
  <!-- Print-only stylesheet (a coach's carry sheet). -->
  <link rel="stylesheet" href="css/print.css" />
</head>
<body>
  <!-- Top app header: wordmark + volleyball motif, with the theme toggle at right. -->
  <header class="appbar">
    <span class="brand">
      <svg class="brand__ball" viewBox="0 0 32 32" width="30" height="30" aria-hidden="true" focusable="false">
        <circle class="ball-face" cx="16" cy="16" r="13" />
        <path class="ball-seam" d="M16 3c-3.6 4-4.6 9-1 13" />
        <path class="ball-seam" d="M5.5 9c4.6 2.6 9.8 3 15.6 1.4" />
        <path class="ball-seam" d="M7 24.5c2-5.2 6.1-8.2 12.2-8.6" />
      </svg>
      <span class="brand__name">RallyReady</span>
    </span>

    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch theme" aria-pressed="false">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <circle cx="12" cy="12" r="4.5" />
        <path d="M12 2v2.4M12 19.6V22M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2 12h2.4M19.6 12H22M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7" />
      </svg>
    </button>
  </header>

  <!-- The router renders the active screen into #screen. -->
  <main id="screen"></main>

  <!-- Fixed bottom tab bar: 5 thumb-friendly tabs with inline SVG icons. -->
  <nav class="tabbar" aria-label="Primary">
    <a href="#ideas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M11 3.5Q11.6 10.9 18.5 11.5 11.6 12.1 11 19.5 10.4 12.1 3.5 11.5 10.4 10.9 11 3.5Z" />
        <path d="M18.5 4v3.2" />
        <path d="M20.1 5.6h-3.2" />
      </svg>
      <span class="tab-label">Ideas</span>
    </a>
    <a href="#season">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M3 16c3 0 4-9 7-9s3.5 7 6.5 7S20 9 21 9" />
      </svg>
      <span class="tab-label">Season</span>
    </a>
    <a href="#drills">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <circle cx="12" cy="12" r="8.5" />
        <circle cx="12" cy="12" r="4.5" />
        <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none" />
      </svg>
      <span class="tab-label">Drills</span>
    </a>
    <a href="#players">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <circle cx="9" cy="8" r="3.2" />
        <path d="M3.5 20c0-3.3 2.7-5.5 5.5-5.5s5.5 2.2 5.5 5.5" />
        <path d="M16.4 5.2a3.2 3.2 0 0 1 0 5.8" />
        <path d="M17.6 14.9c2.3.5 3.9 2.4 3.9 5.1" />
      </svg>
      <span class="tab-label">Players</span>
    </a>
    <a href="#tips">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M9.5 18.5h5" />
        <path d="M10 21.5h4" />
        <path d="M12 2.5a6.5 6.5 0 0 0-4 11.6c.8.7 1.2 1.4 1.3 2.4h5.4c.1-1 .5-1.7 1.3-2.4A6.5 6.5 0 0 0 12 2.5z" />
      </svg>
      <span class="tab-label">Tips</span>
    </a>
    <a href="#team">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M12 2.5 3 7l9 4.5L21 7z" />
        <path d="M3 12l9 4.5L21 12" />
        <path d="M3 17l9 4.5L21 17" />
      </svg>
      <span class="tab-label">Teams</span>
    </a>
  </nav>

  <!--
    Modules load in dependency order; each attaches to the single global
    namespace `RR` (state.js creates it first).
    state -> drills (+ drills-2..11) -> coaching -> periodization -> generator -> ui -> install -> team -> season -> today -> app
    The drill library is split across several files for the <800-lines-per-file rule;
    each drills-N.js concatenates its drills onto RR.drills, so they load in order after drills.js.
    Every tag is `defer`: the browser fetches them all in parallel without blocking
    the first paint, then executes them IN THIS ORDER once the DOM is parsed — so
    the dependency chain above is preserved exactly as with blocking scripts.
  -->
  <script defer src="js/state.js"></script>
  <!-- Localization engine + Romanian dictionary (loads early so every module's
       output can be translated at render time; the flag toggle lives in the header). -->
  <script defer src="js/i18n.js"></script>
  <script defer src="js/i18n-ui.js"></script>
  <script defer src="js/i18n-content.js"></script>
  <script defer src="js/i18n-content2.js"></script>
  <script defer src="js/i18n-positions.js"></script>
  <script defer src="js/drills.js"></script>
  <script defer src="js/drills-2.js"></script>
  <script defer src="js/drills-3.js"></script>
  <script defer src="js/drills-4.js"></script>
  <script defer src="js/drills-5.js"></script>
  <script defer src="js/drills-6.js"></script>
  <script defer src="js/drills-7.js"></script>
  <script defer src="js/drills-8.js"></script>
  <script defer src="js/drills-9.js"></script>
  <script defer src="js/drills-10.js"></script>
  <script defer src="js/drills-11.js"></script>
  <!-- Read-aloud (text-to-speech) for the Tips screen. tts.js is the speech engine
       (Web Speech API); tips-tts.js is the on-screen UI that coaching.js composes
       in at render time. Both degrade gracefully where speechSynthesis is absent. -->
  <script defer src="js/tts.js"></script>
  <script defer src="js/term-glyphs.js"></script>
  <script defer src="js/coaching.js"></script>
  <!-- Expanded coaching-tips library (mental game, teaching, bodies/health,
       game day, tactics, coach development). Each attaches its tips to
       RR.coaching via addTips(), so they must load after coaching.js. -->
  <script defer src="js/coaching-tips-2.js"></script>
  <script defer src="js/coaching-tips-3.js"></script>
  <script defer src="js/tips-tts.js"></script>
  <!-- Romanian <-> English volleyball-terms reference (composed into the Tips screen). -->
  <script defer src="js/terms.js"></script>
  <!-- Tips "show, don't just tell" visuals (animated SVG diagrams + video links).
       Standalone; the Tips screen (coaching.js) composes it in at render time. -->
  <script defer src="js/tips-visuals.js"></script>
  <!-- Position coaching content + API (data loads first, then the helpers that
       read it + the drill library). Loaded before roster.js, which reads
       RR.positions for its position <select> options. -->
  <script defer src="js/positions-data.js"></script>
  <script defer src="js/positions.js"></script>
  <script defer src="js/periodization.js"></script>
  <script defer src="js/generator.js"></script>
  <!-- Court-diagram engine + "how it's organized" engine + their per-drill data.
       Load before ui.js, which composes them into the drill cards. The image
       manifest loads first so the engine can swap the schematic SVG for a vetted
       AI illustration where one exists (else a placeholder / the SVG). -->
  <script defer src="js/diagram-images.js"></script>
  <script defer src="js/diagram.js"></script>
  <script defer src="js/format.js"></script>
  <script defer src="js/extras-build.js"></script>
  <!-- Per-drill organization overrides + court diagrams. extras-data(.js,-2) are
       the games; -3..-11 add the skill / warm-up / cool-down diagrams by category;
       -12 adds the equipment-drill diagrams (hoops/targets, mat defense). -->
  <script defer src="js/extras-data.js"></script>
  <script defer src="js/extras-data-2.js"></script>
  <script defer src="js/extras-data-3.js"></script>
  <script defer src="js/extras-data-4.js"></script>
  <script defer src="js/extras-data-5.js"></script>
  <script defer src="js/extras-data-6.js"></script>
  <script defer src="js/extras-data-7.js"></script>
  <script defer src="js/extras-data-8.js"></script>
  <script defer src="js/extras-data-9.js"></script>
  <script defer src="js/extras-data-10.js"></script>
  <script defer src="js/extras-data-11.js"></script>
  <script defer src="js/extras-data-12.js"></script>
  <script defer src="js/ui.js"></script>
  <!-- Player photo pipeline + store (separate localStorage key). Loads before the
       roster/players modules that read and write photos. -->
  <script defer src="js/photos.js"></script>
  <!-- Install ("Add to Home Screen") helper; loads before today.js, which mounts it. -->
  <script defer src="js/install.js"></script>
  <!-- Shared feature modules — load after ui.js (they read RR.ui), before the
       screens that compose them (team/season/today/drills). -->
  <script defer src="js/teams-ui.js"></script>
  <script defer src="js/games-ui.js"></script>
  <script defer src="js/drill-editor.js"></script>
  <script defer src="js/plan-edit.js"></script>
  <script defer src="js/run.js"></script>
  <script defer src="js/share.js"></script>
  <script defer src="js/roster.js"></script>
  <!-- Players tab, 1-on-1 profile, position coaching screen, lineup builder.
       They compose RR.ui / RR.roster / RR.photos / RR.positions / RR.diagram. -->
  <script defer src="js/players-ui.js"></script>
  <script defer src="js/player-profile.js"></script>
  <script defer src="js/positions-ui.js"></script>
  <script defer src="js/lineup.js"></script>
  <script defer src="js/calendar.js"></script>
  <script defer src="js/team.js"></script>
  <script defer src="js/season.js"></script>
  <script defer src="js/today.js"></script>
  <script defer src="js/history.js"></script>
  <!-- Drills browser screen (reads the RR.drills data + RR.ui helpers). -->
  <script defer src="js/drills-ui.js"></script>
  <!-- Per-page explainer (the i / speaker under every title); app.js mounts it. -->
  <script defer src="js/page-guide.js"></script>
  <!-- The Ideas feed: coaching inspiration to pull from (composes RR.ui + the
       drill/tips libraries + its own content layer). Loads before app.js so the
       default #ideas route can render on first paint. -->
  <script defer src="js/feed.js"></script>
  <!-- Curated feed content (mini practice-flows, challenges, mindset nuggets,
       themes). Attaches to RR.feed via add(), so it loads right after feed.js. -->
  <script defer src="js/feed-data.js"></script>
  <!-- The Ideas deck: the one-card-at-a-time default #ideas view. Composes
       RR.feed (deckSequence/renderItem), so it loads after feed.js. -->
  <script defer src="js/feed-deck.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
